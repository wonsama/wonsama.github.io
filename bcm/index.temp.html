<ons-page>
  <!-- TOOLBAR -->
  <ons-toolbar>
    <div class="center">BCM DAILY AIRDROP</div>
    <div class="left">
      <ons-toolbar-button>
        <ons-icon icon="ion-navicon, material:md-menu"></ons-icon>
      </ons-toolbar-button>
    </div>
  </ons-toolbar>

  <!-- LIST -->
  <ons-list>
    <ons-list-header>
      클릭하면 상세정보를 볼 수 있습니다
      <ons-icon icon="fa-info-circle" class='icon-info'></ons-icon>
    </ons-list-header>
    <ons-list-item expandable>
      <div class="left">
        <img class="list-item__thumbnail" src="https://steemitimages.com/u/navyactifit/avatar">
      </div>
      <div class="center">
        <span class="list-item__title">@navyactifit</span><span class="list-item__subtitle">25.8231 BCM</span>
      </div>
      <div class="expandable-content">
        <ons-list modifier="inset">
          <ons-list-item modifier="longdivider">
            <div class="left"><ons-icon icon="fa-arrows-alt-h" style='color:red'></ons-icon></div>
            <div class="right">Delegation SP : 157090</div>
          </ons-list-item>
          <ons-list-item modifier="longdivider">
            <div class="left"><ons-icon icon="fa-bitcoin" style='color:green'></ons-icon></div>
            <div class="right">Stake BCM : 0</div>
          </ons-list-item>
          <ons-list-item modifier="longdivider">
            <div class="left"><ons-icon icon="fa-bitcoin" style='color:silver'></ons-icon></div>
            <div class="right">Balance BCM : 0</div>
          </ons-list-item>
        </ons-list>
      </div>
    </ons-list-item>
    <ons-list-item expandable>
      <div class="left">
        <img class="list-item__thumbnail" src="https://steemitimages.com/u/wonsama/avatar">
      </div>
      <div class="center">
        <span class="list-item__title">@navyactifit</span><span class="list-item__subtitle">25.8231 BCM</span>
      </div>
      <div class="expandable-content">
        <ons-list modifier="inset">
          <ons-list-item modifier="longdivider">
            <div class="left"><ons-icon icon="fa-arrows-alt-h" style='color:red'></ons-icon></div>
            <div class="right">Delegation SP : 157090</div>
          </ons-list-item>
          <ons-list-item modifier="longdivider">
            <div class="left"><ons-icon icon="fa-bitcoin" style='color:green'></ons-icon></div>
            <div class="right">Stake BCM : 0</div>
          </ons-list-item>
          <ons-list-item modifier="longdivider">
            <div class="left"><ons-icon icon="fa-bitcoin" style='color:silver'></ons-icon></div>
            <div class="right">Balance BCM : 0</div>
          </ons-list-item>
        </ons-list>
      </div>
    </ons-list-item>
  </ons-list>

  <!-- spped dial -->
  <ons-speed-dial position="bottom right" direction="up">
    <ons-fab>
      <ons-icon icon="md-share"></ons-icon>
    </ons-fab>
    <ons-speed-dial-item>
      <ons-icon icon="md-twitter"></ons-icon>
    </ons-speed-dial-item>
    <ons-speed-dial-item>
      <ons-icon icon="md-facebook"></ons-icon>
    </ons-speed-dial-item>
    <ons-speed-dial-item>
      <ons-icon icon="md-google-plus"></ons-icon>
    </ons-speed-dial-item>
  </ons-speed-dial>

  <ons-bottom-toolbar>
  Content
</ons-bottom-toolbar>


</ons-page>
