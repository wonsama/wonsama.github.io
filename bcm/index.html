<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="https://unpkg.com/onsenui/css/onsenui.css">
    <link rel="stylesheet" href="https://unpkg.com/onsenui/css/onsen-css-components.min.css">
    <script src="https://unpkg.com/onsenui/js/onsenui.min.js"></script>
    <script src="https://unpkg.com/jquery/dist/jquery.min.js"></script>
    <style>
      .toolbar{
        /*background-color:#85c1e9*/
      }
      .icon-info{
        color:rgb(48,171,239);
      }
      .icon-steemit{
        color:rgb(8,205,157);
      }
      .btn-move{

      }
      .btn-close{
        
      }
    </style>
  </head>
  <body>

    <!-- ::::: BASE START ::::: -->
    <ons-page>  
        
        <!-- TABBAR -->
        <ons-tabbar swipeable position="bottom">
          <ons-tab page="tabAirdrop.html" label="AIRDROP" icon="fa-plane-arrival" >
          </ons-tab>
          <ons-tab page="tabHistory.html" label="HISTORY" icon="fa-history">
          </ons-tab>
          <ons-tab page="tabAbout.html" label="ABOUT" icon="fa-info" active>
          </ons-tab>
        </ons-tabbar>

    </ons-page>
    <!-- ::::: BASE END ::::: -->

    <!-- ::::: tabAirdrop START ::::: -->
    <template id="tabAirdrop.html">
      <ons-page id="tabAirdrop">
      
        <!-- TOOLBAR -->
        <ons-toolbar position="top">
          <div class="center">BCM DAILY AIRDROP</div>
        </ons-toolbar>
        
        <!-- LIST -->
        <ons-list>
          <ons-list-header id="list_airdrop">
            <span id='list_airdrop_text'>데이터를 로딩 중에 있습니다...</span>
            <ons-icon icon="fa-info-circle" class='icon-info'  onclick="showTemplateDialog()"></ons-icon>
          </ons-list-header>     
        </ons-list>

      </ons-page>
    </template>
    <!-- ::::: tabAirdrop END ::::: -->

    <!-- ::::: tabHistory START ::::: -->
    <template id="tabHistory.html">
      <ons-page id="tabHistory">
      
        <!-- TOOLBAR -->
        <ons-toolbar position="top">
          <div class="center">BCM VOTE HISTORY</div>
        </ons-toolbar>
        
        <!-- LIST -->
        <ons-list>
          <ons-list-header id="list_history">
            <span id='list_history_text'>데이터를 로딩 중에 있습니다...</span>
          </ons-list-header>
          <!--
          <ons-list-item>
            <div class="left">
              <img class="list-item__thumbnail" src="https://steemitimages.com/u/wonsama/avatar">
            </div>
            <div class="center">
              <span class="list-item__title">@wonsama (0.05%)<ons-icon icon="fa-star" class='icon-steemit'></ons-icon></span>
              <span class="list-item__subtitle">/asdsa-2e3123</span>
              <span class="list-item__subtitle">2020.11.11</span>
            </div>
          </ons-list-item>
          -->
        </ons-list>

      </ons-page>
    </template>
    <!-- ::::: tabHistory END ::::: -->

    <!-- ::::: tabAbout START ::::: -->
    <template id="tabAbout.html">
      <ons-page id="tabAbout">

      <!-- TOOLBAR -->
      <ons-toolbar position="top">
        <div class="center">About</div>
      </ons-toolbar>

      <!-- RULESET -->
        <ons-card>
          <div class="title">
            Airdrop ruleset
          </div>
          <div class="content">
            연이율 18% 기준으로 일일(365) 배당량을 할당<br/>( (임대 SP / 3 + 스테이킹 BCM) * 0.18 ) / 365<br/><br/>
            <ons-button modifier="large" onclick="moveMall()">
              <ons-icon icon="fa-city"></ons-icon>
              BCM 몰 둘러보기
            </ons-button>
            <br/><br/>
            <ons-button modifier="large" onclick="moveSteemEngine()">
              <ons-icon icon="fa-city"></ons-icon>
              스팀엔진 : BCM 토큰 거래
            </ons-button>
          </div>
        </ons-card>
        
        <!-- UPDATES -->
        <ons-card>
          <div class="title">
            Updates
          </div>
          <div class="content">
            <ons-list>
              <ons-list-header>created by @wonsama</ons-list-header>
              <ons-list-item>20.02.06 - BCM 이력추가</ons-list-item>
              <ons-list-item>20.02.04 - 최초 작성</ons-list-item>
            </ons-list>
          </div>
        </ons-card>

      </ons-page>
    </template>
    <!-- ::::: tabAbout END ::::: -->

    <!-- ::::: dialog START ::::: -->
    <template id="dialog.html">

      <!-- DIALOG -->
      <ons-dialog id="my-dialog">
        <div style="text-align: center; padding: 10px;">
          <p>
            BCM TOKEN Airdrop Ruleset<br/><br/>
            ((deleSP/3+stakeBCM)*0.18)/365
          </p>

          <p>
            <ons-button onclick="hideDialog('my-dialog')">Close</ons-button>
          </p>
        </div>
      </ons-dialog>
    </template>
    <!-- ::::: dialog END ::::: -->

    <ons-toast id="toast" animation="ascend">
      <ons-row>
        <ons-col width="180px">
          <div id="toast_text"></div>
        </ons-col>
        <ons-col>
          <ons-button class='right' onclick="movePost()" id="toast_button">MOVE</ons-button>
          <ons-button class='right' onclick="toast.hide()" id="toast_button">CLOSE</ons-button>
        </ons-col>
      </ons-row>
      
      
    </ons-toast>

    <script src="https://cdn.jsdelivr.net/npm/steem/dist/steem.min.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/app.js"></script>
  
  </body>
</html>
